apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: intent
resources:
  - namespace.yaml
  - ../../order-agent.yaml
  - ../../appointment-agent.yaml
  - ../../credit-card-repayment-agent.yaml
  - ../../gas-bill-agent.yaml
  - ../../forex-agent.yaml
  - ../../fallback-agent.yaml
  - fake-llm.yaml
  - router-api-test.yaml
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: intent-router-intent-catalog
    files:
      - ../../router-intent-catalog/intents.json
      - ../../router-intent-catalog/field-catalogs.json
      - ../../router-intent-catalog/slot-schemas.json
      - ../../router-intent-catalog/graph-build-hints.json
patchesStrategicMerge:
  - patch-agents-scale-zero.yaml
