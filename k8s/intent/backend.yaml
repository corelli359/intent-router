apiVersion: apps/v1
kind: Deployment
metadata:
  name: intent-backend
  namespace: intent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: intent-backend
  template:
    metadata:
      labels:
        app: intent-backend
    spec:
      containers:
        - name: backend
          image: python:3.12-slim
          imagePullPolicy: IfNotPresent
          workingDir: /workspace
          env:
            - name: PYTHONPATH
              value: /workspace/backend/src
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
          command:
            - /bin/sh
            - -lc
          args:
            - |
              pip install --no-cache-dir /workspace && \
              python -m uvicorn app:app --app-dir /workspace/backend/src --host 0.0.0.0 --port 8000
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: repo
              mountPath: /workspace
      volumes:
        - name: repo
          hostPath:
            path: /mnt/intent-router
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: intent-backend
  namespace: intent
spec:
  selector:
    app: intent-backend
  ports:
    - name: http
      port: 8000
      targetPort: http
  type: ClusterIP
