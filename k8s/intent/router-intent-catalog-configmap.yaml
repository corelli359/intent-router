            "counter_examples": [
              "500",
              "6222020100043219999"
            ],
            "format_hint": "",
            "normalization_hint": "如果识别到标准币种代码，优先使用标准代码。",
            "validation_hint": ""
          },
          {
            "field_code": "payer_card_no",
