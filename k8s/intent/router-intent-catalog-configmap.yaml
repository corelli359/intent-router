            "value_type": "string",
            "aliases": [
              "卖出币种",
              "源币种",
              "付款币种"
            ],
            "examples": [
              "人民币",
              "美元",
              "CNY",
              "USD"
            ],
            "counter_examples": [
              "汇率",
              "金额"
            ],
            "format_hint": "",
            "normalization_hint": "统一映射为 ISO 货币代码，例如 CNY、USD、EUR。",
            "validation_hint": ""
