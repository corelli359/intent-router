          "domain_name": "账户服务",
          "domain_description": "账户余额、账户状态、账户基础查询相关意图。",
          "examples": [
            "查一下我的账户余额",
            "帮我查银行卡还有多少钱",
            "看下这张卡余额",
            "查询余额"
          ],
          "agent_url": "http://intent-order-agent.intent.svc.cluster.local:8000/api/agent/run",
          "is_leaf_intent": true,
          "parent_intent_code": "",
          "status": "active",
          "routing_examples": [
            "查一下余额",
            "看看我银行卡还有多少钱",
            "查询账户余额"
          ],
          "is_fallback": false,
          "dispatch_priority": 100,
          "request_schema": {
            "type": "object",
            "required": [
              "sessionId",
              "taskId",
              "input"
            ]
          },
          "field_mapping": {
            "sessionId": "$session.id",
            "taskId": "$task.id",
            "input": "$message.current",
            "conversation.recentMessages": "$context.recent_messages",
            "conversation.longTermMemory": "$context.long_term_memory",
            "account.cardNumber": "$slot_memory.card_number",
            "account.phoneLast4": "$slot_memory.phone_last_four"
