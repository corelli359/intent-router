            "semantic_definition": "本次转账使用的付款卡卡号或卡尾号。",
            "value_type": "string",
            "aliases": [
              "付款卡",
              "付款卡号",
              "付款卡尾号"
            ],
            "examples": [
              "6222020100043219999",
              "8888"
