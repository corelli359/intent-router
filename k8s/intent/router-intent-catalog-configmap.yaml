          {
            "field_code": "credit_card_phone_last_four",
            "label": "手机号后4位",
            "semantic_definition": "该信用卡绑定手机号的后4位。",
            "value_type": "phone_last4",
            "aliases": [
              "手机号后4位",
              "手机尾号",
              "后四位"
            ],
            "examples": [
              "6666"
            ],
            "counter_examples": [
              "完整手机号",
              "卡号"
            ],
            "format_hint": "只保留后 4 位数字。",
            "normalization_hint": "若用户提供完整手机号，仅保留最后 4 位。",
            "validation_hint": "必须是 4 位数字。"
          }
        ],
