            "label": "金额",
            "semantic_definition": "本次转账实际金额。",
            "value_type": "currency",
            "aliases": [
              "金额",
              "转账金额",
              "汇款金额"
            ],
            "examples": [
              "500",
              "2000.50"
            ],
            "counter_examples": [
              "银行卡号",
              "币种"
            ],
            "format_hint": "输出数字字符串，不保留货币单位。",
            "normalization_hint": "去掉元、块、人民币等单位。",
            "validation_hint": "必须是正数金额。"
