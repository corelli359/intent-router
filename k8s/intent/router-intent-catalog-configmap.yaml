              "收款银行",
              "收款卡银行"
            ],
            "examples": [
              "招商银行",
              "中国银行"
            ],
            "counter_examples": [],
            "format_hint": "",
            "normalization_hint": "",
            "validation_hint": ""
          },
          {
            "field_code": "payee_phone",
            "label": "收款手机号/尾号",
            "semantic_definition": "收款人手机号或手机号尾号。",
            "value_type": "string",
            "aliases": [
              "收款手机号",
              "收款手机号尾号",
              "收款手机号/尾号"
            ],
            "examples": [
              "13800138000",
              "1234"
            ],
            "counter_examples": [],
            "format_hint": "",
            "normalization_hint": "",
            "validation_hint": ""
          }
        ],
        "query_credit_card_repayment": [
          {
            "field_code": "credit_card_number",
            "label": "信用卡卡号",
