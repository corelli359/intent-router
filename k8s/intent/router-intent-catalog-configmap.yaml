            "counter_examples": [
              "收款人姓名",
              "转账金额"
            ],
            "format_hint": "",
            "normalization_hint": "",
            "validation_hint": ""
          },
          {
            "field_code": "payer_card_remark",
            "label": "付款卡备注",
            "semantic_definition": "本次转账付款卡对应的备注名称。",
            "value_type": "string",
            "aliases": [
              "付款卡备注",
              "付款账户备注"
