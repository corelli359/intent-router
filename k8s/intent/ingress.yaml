apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: intent-router
  namespace: intent
  annotations:
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/affinity-mode: "persistent"
    nginx.ingress.kubernetes.io/session-cookie-name: "intent-router-affinity"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/app-root: /chat
spec:
  ingressClassName: nginx
  rules:
    - host: intent-router.kkrrc-359.top
      http:
        paths:
          - path: /api/router
            pathType: Prefix
            backend:
              service:
                name: intent-router-api
                port:
                  number: 8000
          - path: /api/admin
            pathType: Prefix
            backend:
              service:
                name: intent-admin-api
                port:
                  number: 8000
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: intent-admin-web
                port:
                  number: 3001
          - path: /chat
            pathType: Prefix
            backend:
              service:
                name: intent-chat-web
                port:
                  number: 3000
