apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: intent-router
  namespace: intent
  annotations:
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/affinity-mode: "persistent"
    nginx.ingress.kubernetes.io/session-cookie-name: "intent-router-affinity"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: ai.intent-router.cc
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: intent-backend
                port:
                  number: 8000
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: intent-admin-web
                port:
                  number: 3001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: intent-chat-web
                port:
                  number: 3000
