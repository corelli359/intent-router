apiVersion: apps/v1
kind: Deployment
metadata:
  name: intent-router-v4-observer-ui
  namespace: intent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: intent-router-v4-observer-ui
  template:
    metadata:
      labels:
        app: intent-router-v4-observer-ui
    spec:
      containers:
        - name: router-v4-observer-ui
          image: python:3.12-slim
          imagePullPolicy: IfNotPresent
          workingDir: /workspace/services/router-v4-observer-ui
          command:
            - /bin/sh
            - -lc
          args:
            - |
              set -e
              python -m http.server 3010 --bind 0.0.0.0
          ports:
            - containerPort: 3010
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 60
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: repo
              mountPath: /workspace
      volumes:
        - name: repo
          hostPath:
            path: /mnt/intent-router
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: intent-router-v4-observer-ui
  namespace: intent
spec:
  selector:
    app: intent-router-v4-observer-ui
  ports:
    - name: http
      port: 3010
      targetPort: http
  type: ClusterIP
