apiVersion: apps/v1
kind: Deployment
metadata:
  name: intent-router-api
  namespace: intent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: intent-router-api
  template:
    metadata:
      labels:
        app: intent-router-api
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: router-api
          image: python:3.12-slim
          imagePullPolicy: IfNotPresent
          workingDir: /workspace
          env:
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
          command:
            - /bin/sh
            - -lc
          args:
            - |
              set -e
              python -m pip install --no-cache-dir \
                /workspace/backend/contracts/intent-registry \
                /workspace/backend/services/router-service
              python -m uvicorn router_service.api.app:app --host 0.0.0.0 --port 8000
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: 250m
              memory: 384Mi
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            timeoutSeconds: 1
            failureThreshold: 180
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: repo
              mountPath: /workspace
      volumes:
        - name: repo
          hostPath:
            path: /mnt/intent-router
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: intent-router-api
  namespace: intent
spec:
  selector:
    app: intent-router-api
  ports:
    - name: http
      port: 8000
      targetPort: http
  type: ClusterIP
