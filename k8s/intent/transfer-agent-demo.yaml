apiVersion: apps/v1
kind: Deployment
metadata:
  name: intent-transfer-agent-demo
  namespace: intent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: intent-transfer-agent-demo
  template:
    metadata:
      labels:
        app: intent-transfer-agent-demo
    spec:
      containers:
        - name: transfer-agent-demo
          image: python:3.12-slim
          imagePullPolicy: IfNotPresent
          workingDir: /workspace/services/transfer-agent-demo
          env:
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: TRANSFER_AGENT_DEMO_ROUTER_BASE_URL
              value: http://intent-router-api.intent.svc.cluster.local:8000
          command:
            - /bin/sh
            - -lc
          args:
            - |
              set -e
              python -m pip install --no-cache-dir \
                "fastapi>=0.115,<1.0" \
                "httpx>=0.27,<1.0" \
                "orjson>=3.10,<4.0" \
                "pydantic>=2.8,<3.0" \
                "uvicorn>=0.30,<1.0"
              python -m uvicorn app:app --host 0.0.0.0 --port 8031
          ports:
            - containerPort: 8031
              name: http
          resources:
            requests:
              cpu: 150m
              memory: 192Mi
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 120
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: repo
              mountPath: /workspace
      volumes:
        - name: repo
          hostPath:
            path: /mnt/intent-router
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: intent-transfer-agent-demo
  namespace: intent
spec:
  selector:
    app: intent-transfer-agent-demo
  ports:
    - name: http
      port: 8031
      targetPort: http
  type: ClusterIP
